version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: vigilance-elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - vigilance-network
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    container_name: vigilance-logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - vigilance-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.9
    container_name: vigilance-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - vigilance-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

  wazuh-manager:
    image: wazuh/wazuh-manager:4.4.5
    container_name: vigilance-wazuh-manager
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
      - "1515:1515/tcp"
      - "55000:55000/tcp"
      - "514:514/udp"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - wazuh_api_config:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
    networks:
      - vigilance-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  es_data:
    driver: local
  wazuh_api_config:
    driver: local
  wazuh_etc:
    driver: local
  wazuh_logs:
    driver: local
  wazuh_queue:
    driver: local
  wazuh_var_multigroups:
    driver: local

networks:
  vigilance-network:
    driver: bridge
